services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${HOME}/.apmatia:/root/.apmatia
      - ${HOME}/.config/apmatia:/root/.config/apmatia
      - ${HOME}/.local/share/apmatia:/root/.local/share/apmatia
    environment:
      - APMATIA_HOME=/root/.apmatia
      - APMATIA_DATA_DIR=/root/.local/share/apmatia
