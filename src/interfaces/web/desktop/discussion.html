<!DOCTYPE html>
<html>
<head>
  <title>Apmatia Discussion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/theme-runtime.js"></script>
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="page-discussion">
<div class="mobile-titlebar">
  <div class="mobile-titlebar-inner">
    <div class="mobile-titlebar-left">
      <button type="button" class="mobile-icon-button" data-mobile-menu-toggle aria-label="Open menu">
        <span class="icon-hamburger" aria-hidden="true"></span>
      </button>
    </div>
    <span class="mobile-titlebar-title">Discussion</span>
    <div class="mobile-titlebar-right">
      <a class="mobile-icon-button" href="/settings" aria-label="Settings">
        <svg class="mobile-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3.2"></circle>
          <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a1.5 1.5 0 0 1 0 2.1l-1.4 1.4a1.5 1.5 0 0 1-2.1 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V21a1.5 1.5 0 0 1-1.5 1.5h-2a1.5 1.5 0 0 1-1.5-1.5v-.1a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a1.5 1.5 0 0 1-2.1 0l-1.4-1.4a1.5 1.5 0 0 1 0-2.1l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H3a1.5 1.5 0 0 1-1.5-1.5v-2A1.5 1.5 0 0 1 3 10h.1a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a1.5 1.5 0 0 1 0-2.1l1.4-1.4a1.5 1.5 0 0 1 2.1 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V3A1.5 1.5 0 0 1 10.5 1.5h2A1.5 1.5 0 0 1 14 3v.1a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a1.5 1.5 0 0 1 2.1 0l1.4 1.4a1.5 1.5 0 0 1 0 2.1l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6h.1A1.5 1.5 0 0 1 22.5 10v2a1.5 1.5 0 0 1-1.5 1.5h-.1a1 1 0 0 0-.9.6z"></path>
        </svg>
      </a>
      <button type="button" class="mobile-icon-button logout-action" aria-label="User menu and logout">
        <svg class="mobile-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M4.5 20.5c0-3.7 3.4-6 7.5-6s7.5 2.3 7.5 6"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
<mobile-drawer-menu
  items='[{"type":"link","label":"Main Menu","href":"/"},{"type":"link","label":"Open Discussion","href":"/discussion_tree"},{"type":"button","label":"New Discussion","action":"new-discussion","closeOnClick":true}]'
></mobile-drawer-menu>
<div class="mobile-content">

<div class="card">
  <div class="header">
    <h1>Discussion</h1>
    <div class="header-links">
      <a class="nav-link" href="/settings">Settings</a>
      <a class="nav-link" href="/">Main Menu</a>
      <button type="button" class="nav-link-button logout-action">Logout</button>
    </div>
  </div>

  <div id="conversation"></div>
  <button id="scroll-latest-button" type="button" aria-label="Jump to latest messages">↓ Latest</button>
  <div id="discussion-bottom" class="discussion-bottom">
    <div class="status" id="status">Connecting...</div>
    <div class="composer">
      <button id="send-button" onclick="sendPrompt()">Send Prompt</button>
      <textarea
        id="prompt"
        rows="3"
        placeholder="Enter prompt (Markdown supported). Press Ctrl+Enter or Cmd+Enter to send."
      ></textarea>
    </div>
  </div>
</div>

<script src="/discussion.js"></script>
<script src="/auth-ui.js"></script>
<script src="/mobile-drawer.js"></script>
<script src="/mobile-menu.js"></script>

</div>
</body>
</html>
